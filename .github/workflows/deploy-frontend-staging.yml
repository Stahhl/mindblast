name: Deploy Frontend Staging

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-frontend-staging.yml"
      - ".firebaserc"
      - "firebase.json"
      - "src/apps/frontend/**"
      - "quizzes/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-staging-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FIREBASE_PROJECT_ID: mindblast-staging
      FIREBASE_HOSTING_TARGET: staging
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/apps/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir src/apps/frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir src/apps/frontend build

      - name: Assemble hosting artifact
        run: |
          rm -rf .firebase/staging
          mkdir -p .firebase/staging
          cp -R src/apps/frontend/dist/. .firebase/staging/
          mkdir -p .firebase/staging/quizzes
          cp -R quizzes/. .firebase/staging/quizzes/

      - name: Validate hosting artifact
        run: |
          test -f .firebase/staging/index.html
          test -f .firebase/staging/quizzes/latest.json

      - name: Deploy to Firebase Hosting (staging)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_STAGING_ }}
          projectId: mindblast-staging 
          target: staging
          channelId: live
