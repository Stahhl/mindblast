name: Deploy Frontend Production

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/deploy-frontend-production.yml"
      - ".firebaserc"
      - "firebase.json"
      - "src/apps/frontend/**"
  workflow_run:
    workflows:
      - Daily Quiz Generation
    types:
      - completed
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: frontend-production-deploy
  cancel-in-progress: true

jobs:
  deploy:
    if: |
      github.event_name != 'workflow_run' ||
      github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    env:
      QUIZ_CONTENT_REPO: ${{ vars.QUIZ_CONTENT_REPO }}
      FIREBASE_PROJECT_ID: mindblast-prod
      FIREBASE_HOSTING_TARGET: production
      VITE_APP_ENV: production
      VITE_FIREBASE_API_KEY: ${{ vars.FIREBASE_WEB_API_KEY_PRODUCTION }}
      VITE_FIREBASE_AUTH_DOMAIN: ${{ vars.FIREBASE_AUTH_DOMAIN_PRODUCTION }}
      VITE_FIREBASE_PROJECT_ID: mindblast-prod
      VITE_FIREBASE_APP_ID: ${{ vars.FIREBASE_WEB_APP_ID_PRODUCTION }}
      VITE_FIREBASE_STORAGE_BUCKET: ${{ vars.FIREBASE_STORAGE_BUCKET_PRODUCTION }}
      VITE_FIREBASE_APPCHECK_SITE_KEY: ${{ vars.FIREBASE_APPCHECK_SITE_KEY_PRODUCTION }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Checkout content repository
        uses: actions/checkout@v4
        with:
          repository: ${{ env.QUIZ_CONTENT_REPO }}
          token: ${{ secrets.CONTENT_REPO_READ_TOKEN }}
          path: .content-repo

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: src/apps/frontend/pnpm-lock.yaml

      - name: Install frontend dependencies
        run: pnpm --dir src/apps/frontend install --frozen-lockfile

      - name: Build frontend
        run: pnpm --dir src/apps/frontend build

      - name: Assemble hosting artifact
        run: |
          rm -rf .firebase/production
          mkdir -p .firebase/production
          cp -R src/apps/frontend/dist/. .firebase/production/
          mkdir -p .firebase/production/quizzes
          cp -R .content-repo/quizzes/. .firebase/production/quizzes/

      - name: Validate hosting artifact
        run: |
          test -f .firebase/production/index.html
          test -f .firebase/production/quizzes/latest.json

      - name: Deploy to Firebase Hosting (production)
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION != '' && secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION || secrets.FIREBASE_SERVICE_ACCOUNT_PRODUCTION_ }}
          projectId: ${{ env.FIREBASE_PROJECT_ID }}
          target: ${{ env.FIREBASE_HOSTING_TARGET }}
          channelId: live
