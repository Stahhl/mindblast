name: Feedback API Security

on:
  pull_request:
    paths:
      - "src/apps/feedback-api/**"
      - ".github/workflows/feedback-api-security.yml"
  push:
    branches:
      - main
    paths:
      - "src/apps/feedback-api/**"
      - ".github/workflows/feedback-api-security.yml"
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

concurrency:
  group: feedback-api-security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.10.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: pnpm --dir src/apps/feedback-api install --frozen-lockfile

      - name: Production dependency vulnerability audit
        run: pnpm --dir src/apps/feedback-api audit --prod

  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        language:
          - javascript-typescript
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Analyze
        uses: github/codeql-action/analyze@v3
