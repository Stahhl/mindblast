name: Daily Quiz Generation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch: # Allows manual trigger from GitHub UI

permissions:
  contents: write

concurrency:
  group: quiz-forge-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      QUIZ_TYPES: "which_came_first,history_mcq_4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Generate daily quiz
        run: python scripts/generate_quiz.py --quiz-types "${QUIZ_TYPES}"

      - name: Commit and push if new quiz was created
        run: |
          if [ -z "$(git status --porcelain -- quizzes)" ]; then
            echo "No changes in quizzes/"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quizzes
          git commit -m "quiz-forge: add quiz for $(date -u +%F)"
          git push

      - name: Send Discord status notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping Discord notification."
            exit 0
          fi

          STATUS_TEXT="SUCCESS"
          STATUS_EMOJI="✅"
          if [ "${JOB_STATUS}" != "success" ]; then
            STATUS_TEXT="FAILURE"
            STATUS_EMOJI="❌"
          fi

          MESSAGE="$(printf '%s mindblast quiz-forge daily job: %s\nrepo: %s\nworkflow: %s\nrun: %s' \
            "${STATUS_EMOJI}" "${STATUS_TEXT}" "${REPO}" "${WORKFLOW}" "${RUN_URL}")"

          PAYLOAD="$(MESSAGE="${MESSAGE}" python3 -c 'import json,os; print(json.dumps({"content": os.environ["MESSAGE"]}))')"

          if ! curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data "${PAYLOAD}"; then
            echo "Failed to send Discord notification."
          fi
