name: Daily Quiz Generation

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:
    inputs:
      date:
        description: "UTC date override (YYYY-MM-DD). Leave empty for today."
        required: false
        type: string
      quiz_types:
        description: "Comma-separated quiz types."
        required: false
        default: "which_came_first,history_mcq_4"
        type: string
      mode:
        description: "Generation mode."
        required: false
        default: "extra"
        type: choice
        options:
          - daily
          - extra
      count:
        description: "Quizzes per quiz type."
        required: false
        default: "1"
        type: string

permissions:
  contents: write

concurrency:
  group: quiz-forge-daily
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      QUIZ_TYPES: ${{ inputs.quiz_types || 'which_came_first,history_mcq_4' }}
      QUIZ_MODE: ${{ inputs.mode || 'daily' }}
      QUIZ_COUNT: ${{ inputs.count || '1' }}
      QUIZ_DATE: ${{ inputs.date || '' }}
      AI_MODE: ${{ vars.AI_MODE }}
      AI_PROVIDER: ${{ vars.AI_PROVIDER }}
      AI_MODEL: ${{ vars.AI_MODEL }}
      AI_MAX_DAILY_USD: ${{ vars.AI_MAX_DAILY_USD }}
      AI_MAX_MONTHLY_USD: ${{ vars.AI_MAX_MONTHLY_USD }}
      QUIZ_FORGE_AI_REPORT_PATH: ${{ github.workspace }}/.tmp/quiz-forge-ai-report.json
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync Python environment
        run: uv sync --locked --no-dev --python 3.12

      - name: Generate daily quiz
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          EXTRA_ARGS=()
          if [ -n "${QUIZ_DATE}" ]; then
            EXTRA_ARGS+=(--date "${QUIZ_DATE}")
          fi

          uv run --python 3.12 python scripts/generate_quiz.py \
            --quiz-types "${QUIZ_TYPES}" \
            --mode "${QUIZ_MODE}" \
            --count "${QUIZ_COUNT}" \
            "${EXTRA_ARGS[@]}"

      - name: Commit and push if new quiz was created
        run: |
          if [ -z "$(git status --porcelain -- quizzes)" ]; then
            echo "No changes in quizzes/"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add quizzes
          git commit -m "quiz-forge: add quiz for $(date -u +%F)"
          git push

      - name: Send Discord status notification
        if: always()
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          JOB_STATUS: ${{ job.status }}
          REPO: ${{ github.repository }}
          WORKFLOW: ${{ github.workflow }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
          QUIZ_FORGE_AI_REPORT_PATH: ${{ github.workspace }}/.tmp/quiz-forge-ai-report.json
        run: |
          if [ -z "${DISCORD_WEBHOOK_URL}" ]; then
            echo "DISCORD_WEBHOOK_URL is not set; skipping Discord notification."
            exit 0
          fi

          STATUS_TEXT="SUCCESS"
          STATUS_EMOJI="✅"
          if [ "${JOB_STATUS}" != "success" ]; then
            STATUS_TEXT="FAILURE"
            STATUS_EMOJI="❌"
          fi

          MESSAGE="$(printf '%s mindblast quiz-forge daily job: %s\nrepo: %s\nworkflow: %s\nrun: %s' \
            "${STATUS_EMOJI}" "${STATUS_TEXT}" "${REPO}" "${WORKFLOW}" "${RUN_URL}")"

          if [ -f "${QUIZ_FORGE_AI_REPORT_PATH}" ]; then
            AI_BLOCK="$(python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          report_path = Path(os.environ["QUIZ_FORGE_AI_REPORT_PATH"])
          payload = json.loads(report_path.read_text(encoding="utf-8"))
          reasons = payload.get("fallback_reasons") or []
          reasons_text = ", ".join(reasons) if reasons else "none"
          lines = [
              "ai:",
              f"  mode: {payload.get('ai_mode', 'unknown')}",
              f"  provider/model: {payload.get('provider', 'unknown')}/{payload.get('model', 'unknown')}",
              f"  calls: {payload.get('calls_total', 0)}",
              f"  tokens in/out: {payload.get('input_tokens_total', 0)}/{payload.get('output_tokens_total', 0)}",
              f"  run spend usd: {payload.get('run_estimated_cost_usd', 0)}",
              f"  day spend usd: {payload.get('day_spend_usd', 0)} / {payload.get('day_limit_usd', 0)}",
              f"  month spend usd: {payload.get('month_spend_usd', 0)} / {payload.get('month_limit_usd', 0)}",
              f"  fallbacks: {payload.get('fallback_count', 0)} ({reasons_text})",
          ]
          print("\n".join(lines))
          PY
            )"
            MESSAGE="${MESSAGE}"$'\n'"${AI_BLOCK}"
          fi

          PAYLOAD="$(MESSAGE="${MESSAGE}" python3 -c 'import json,os; print(json.dumps({"content": os.environ["MESSAGE"]}))')"

          if ! curl -sS -X POST "${DISCORD_WEBHOOK_URL}" \
            -H "Content-Type: application/json" \
            --data "${PAYLOAD}"; then
            echo "Failed to send Discord notification."
          fi
