name: Quiz Forge Tests

on:
  pull_request:
    paths:
      - "scripts/quiz_forge/**"
      - "tests/quiz_forge/**"
      - "pyproject.toml"
      - "uv.lock"
  push:
    branches:
      - main
    paths:
      - "scripts/quiz_forge/**"
      - "tests/quiz_forge/**"
      - "pyproject.toml"
      - "uv.lock"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quiz-forge-tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: quiz-forge pytest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install --upgrade uv

      - name: Sync test environment
        run: uv sync --locked --dev --python 3.12

      - name: Run quiz-forge tests
        run: uv run --python 3.12 pytest tests/quiz_forge
